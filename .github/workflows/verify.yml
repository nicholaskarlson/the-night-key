name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: "verify (${{ matrix.os }}, py${{ matrix.py }})"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        py: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Lint + typecheck
        run: |
          ruff format --check .
          ruff check .
          mypy src/btg

      - name: Story lint
        run: |
          btg lint --strict --story the-night-key
          btg lint --strict --story starter

      - name: Tests
        run: |
          pytest -q

      - name: Build packs
        run: |
          python scripts/build_packs.py
