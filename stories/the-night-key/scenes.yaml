schema_version: 1
title: "The Night Key"
start: lobby_arrival
flags:
  - found_master_key
  - saw_guest_log
  - trusted_maintenance
  - called_police
  - manager_warned

scenes:
  - id: lobby_arrival
    text: >
      The lobby smells like wet wool and old lemon polish. Rain needles the glass.
      You sign in for the night shift and the desk phone blinks once—then goes still.
      Upstairs, a guest has not been seen since dusk.
    choices:
      - label: "Check the guest log."
        goto: guest_log
      - label: "Walk the hallway and listen at doors."
        goto: hallway_listen
      - label: "Call the manager for instructions."
        goto: call_manager
      - label: "Write an incident note and end your shift."
        goto: end_shift

  - id: guest_log
    text: >
      Names, dates, room numbers. The ink looks tired. One entry is smudged as if
      someone tried to erase it without fully committing.
    choices:
      - label: "Note the smudged entry."
        goto: note_smudge
        sets_flags: [saw_guest_log]
      - label: "Return to the lobby."
        goto: lobby_arrival

  - id: hallway_listen
    text: >
      The hallway carpet drinks your footsteps. Behind one door, a TV murmurs.
      Behind another—nothing. The quiet has weight.
    choices:
      - label: "Try the service stairwell."
        goto: service_stairs_locked
      - label: "Try the service stairwell door with the master key."
        goto: service_stairs_open
        requires_flags: [found_master_key]
      - label: "Return to the lobby."
        goto: lobby_arrival

  - id: call_manager
    text: >
      The manager answers on the second ring. His voice is calm in a way that feels practiced.
      “Keep it discreet,” he says. “No drama. No police.”
    choices:
      - label: "Agree. Handle it quietly."
        goto: discreet_promise
        sets_flags: [manager_warned]
      - label: "Refuse. Say you may need to call for help."
        goto: pushback
        sets_flags: [manager_warned, called_police]

  - id: note_smudge
    text: >
      You copy the smudged room number into your pocket notebook.
      You feel a small, stubborn urge to confirm what someone hoped would stay uncertain.
    choices:
      - label: "Return to the lobby."
        goto: lobby_arrival

  - id: service_stairs_locked
    text: >
      The service door is locked. A small sign reads STAFF ONLY.
      The keyhole looks recently scratched.
    choices:
      - label: "Go find maintenance."
        goto: find_maintenance
      - label: "Return to the lobby."
        goto: lobby_arrival

  - id: service_stairs_open
    text: >
      The master key turns too smoothly, as if it has been used tonight already.
      The service stairwell smells like damp concrete and old detergent.
      One flight down, a second door waits with a deadbolt and a smear of fresh paint.
    choices:
      - label: "Go down one flight."
        goto: end_shift
      - label: "Close the door and return to the lobby."
        goto: hallway_listen

  - id: find_maintenance
    text: >
      In the back corridor, a maintenance worker wipes his hands on a rag.
      He watches you the way people watch trouble approaching.
    choices:
      - label: "Ask for the master key."
        goto: ask_key
      - label: "Ask what he knows about the missing guest."
        goto: ask_missing

  - id: ask_key
    text: >
      “We don’t just hand that out,” he says. Then, quieter: “Not tonight.”
    choices:
      - label: "Press him."
        goto: press_key
      - label: "Back off—for now."
        goto: lobby_arrival

  - id: ask_missing
    text: >
      He looks toward the stairwell. “Some doors open easy,” he says.
      “Some doors open you.”
    choices:
      - label: "Ask what that means."
        goto: doors_open_you
      - label: "Return to the lobby."
        goto: lobby_arrival

  - id: press_key
    text: >
      He studies your face. “If I give you the key,” he says, “you’re in it with me.”
    choices:
      - label: "Promise you won’t blame him."
        goto: key_promise
        sets_flags: [trusted_maintenance, found_master_key]
      - label: "Say you’ll do what’s required."
        goto: key_taken
        sets_flags: [found_master_key]

  - id: key_promise
    text: >
      He nods once and slips the master key into your palm like a secret.
    choices:
      - label: "Return to the hallway."
        goto: hallway_listen

  - id: key_taken
    text: >
      The key is heavier than it should be. You feel the night narrow around you.
    choices:
      - label: "Return to the hallway."
        goto: hallway_listen

  - id: doors_open_you
    text: >
      He doesn’t explain. He just looks tired. “You’ll see,” he says. “If you go up.”
    choices:
      - label: "Return to the hallway."
        goto: hallway_listen

  - id: discreet_promise
    text: >
      You hang up. The lobby feels suddenly larger—like it is giving you space to make a mistake.
    choices:
      - label: "Check the guest log."
        goto: guest_log
      - label: "Walk the hallway."
        goto: hallway_listen

  - id: pushback
    text: >
      The manager goes quiet. “Do what you have to,” he says finally.
      “But remember who signs your checks.”
    choices:
      - label: "Hang up and work anyway."
        goto: lobby_arrival

  - id: end_shift
    terminal: true
    text: >
      You write what you can, careful with words that might become evidence later.
      Outside, the rain keeps working the city into a blur.
      Whatever is happening here, it will not stay only in your head.
